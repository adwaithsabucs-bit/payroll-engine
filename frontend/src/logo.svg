<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="white" stroke="#2d3748" stroke-width="8"/>

  <!-- Left building (outline style) -->
  <rect x="30" y="75" width="22" height="60" fill="none" stroke="#2d3748" stroke-width="5" stroke-linejoin="round"/>
  <rect x="30" y="60" width="22" height="18" fill="none" stroke="#2d3748" stroke-width="5" stroke-linejoin="round"/>

  <!-- Right tall building with vertical lines (blue filled) -->
  <rect x="118" y="45" width="28" height="90" fill="#1e6abf" rx="2"/>
  <!-- Vertical stripes on right building -->
  <line x1="124" y1="50" x2="124" y2="130" stroke="white" stroke-width="2.5"/>
  <line x1="130" y1="50" x2="130" y2="130" stroke="white" stroke-width="2.5"/>
  <line x1="136" y1="50" x2="136" y2="130" stroke="white" stroke-width="2.5"/>
  <line x1="142" y1="50" x2="142" y2="130" stroke="white" stroke-width="2.5"/>

  <!-- Blue triangle / flag on top of right building -->
  <polygon points="118,45 146,45 118,18" fill="#1e6abf"/>

  <!-- Center building (outline) -->
  <rect x="72" y="65" width="28" height="70" fill="none" stroke="#2d3748" stroke-width="5" stroke-linejoin="round"/>

  <!-- Roofline / chevron (blue) -->
  <polyline points="25,138 60,110 86,128 100,118 114,128 140,108 172,138"
    fill="none" stroke="#1e6abf" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Small house at bottom center -->
  <!-- House roof -->
  <polyline points="82,140 100,124 118,140"
    fill="none" stroke="#1e6abf" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- House body -->
  <rect x="85" y="140" width="30" height="22" fill="none" stroke="#2d3748" stroke-width="4" stroke-linejoin="round"/>
  <!-- Window -->
  <rect x="93" y="146" width="14" height="12" fill="none" stroke="#2d3748" stroke-width="3"/>
  <line x1="100" y1="146" x2="100" y2="158" stroke="#2d3748" stroke-width="2"/>
  <line x1="93" y1="152" x2="107" y2="152" stroke="#2d3748" stroke-width="2"/>
</svg>
